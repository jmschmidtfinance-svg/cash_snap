name: Daily cash snap

on:
  schedule:
    # 05:30 UTC = just after midnight US/Eastern year-round (00:30 EST / 01:30 EDT), so the
    # reported day is fully closed before we pull. report_date defaults to "yesterday".
    # GitHub cron is best-effort; a missed run self-heals because the roll-forward reconciles
    # against the last *logged* balance over whatever gap occurred.
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Override report date (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""

# Needed so the job can commit the persisted state file (state/cash_state.json) back to the repo.
permissions:
  contents: write

jobs:
  cash-snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run cash snap
        env:
          NS_ACCOUNT_ID:     ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY:   ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SECRET: ${{ secrets.NS_CONSUMER_SECRET }}
          NS_TOKEN_ID:       ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET:   ${{ secrets.NS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM:         ${{ secrets.MAIL_FROM }}
          MAIL_TO:           ${{ secrets.MAIL_TO }}
          SNAP_THRESHOLD:    ${{ vars.SNAP_THRESHOLD }}
          CASH_EXTRA_ACCOUNT_IDS: ${{ vars.CASH_EXTRA_ACCOUNT_IDS }}
          REPORT_DATE:       ${{ github.event.inputs.report_date }}
        run: python cash_snap.py

      - name: Persist reported balance (audit ledger)
        if: success()
        run: |
          git config user.name  "cash-snap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/cash_state.json
          git diff --staged --quiet || git commit -m "state: reported cash balance"
          git push
